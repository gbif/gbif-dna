title: UNITE Species Hypotheses - General Release
targetGene: ITS
taxonRanks: kingdom;phylum;class;order;family;genus;species
description: |-
  UNITE is a database and sequence management environment for molecular identification of fungi. It provides DNA-based species hypotheses (SHs) that group sequences into species-level clusters.

  This dataset contains the general release of UNITE Species Hypotheses with dynamic clustering thresholds. Records have been enriched with metadata from NCBI GenBank where available (coordinates, country, collection numbers).
