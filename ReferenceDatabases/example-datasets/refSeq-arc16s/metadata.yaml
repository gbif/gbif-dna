title: Archaeal 16S Ribosomal RNA RefSeq Targeted Loci Project
targetGene: 16S rRNA
taxonRanks: domain;kingdom;subkingdom;phylum;class;order;family;genus;species
description: |-
  The small subunit ribosomal RNA is a useful phylogenetic marker that has been used extensively for evolutionary analyses. The RefSeq dataset contains curated 16S ribosomal RNA sequences that correspond to archaea type materials.

  The RefSeq records may contain corrections to the sequence or taxonomy as compared to the original INSD submission, and may have additional information added that is not found in the original.
